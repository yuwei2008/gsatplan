<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>116學測複習控制台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar glass">
        <div>
          <p class="eyebrow">116 GSAT</p>
          <h1>複習控制台</h1>
        </div>
        <div class="countdown" aria-label="學測倒數">
          <span id="countDays">--</span>
          <small>天</small>
        </div>
      </header>

      <section class="overview">
        <article class="metric glass">
          <span>今日檢核</span>
          <strong id="todayProgress">0/0</strong>
          <div class="bar"><i id="todayBar"></i></div>
        </article>
        <article class="metric glass">
          <span>總完成率</span>
          <strong id="overallProgress">0%</strong>
          <div class="bar"><i id="overallBar"></i></div>
        </article>
        <article class="timer glass">
          <div class="timer-head">
            <span>計時</span>
            <select id="timerMode" aria-label="計時模式">
              <option value="50">50 分</option>
              <option value="25">25 分</option>
              <option value="10">10 分</option>
            </select>
          </div>
          <strong id="timerDisplay">50:00</strong>
          <div class="timer-actions">
            <button id="startTimer" type="button">開始</button>
            <button id="pauseTimer" type="button">暫停</button>
            <button id="resetTimer" type="button">重置</button>
          </div>
        </article>
      </section>

      <section class="controls glass">
        <div class="segmented" id="rangeFilters" aria-label="日期篩選">
          <button class="active" data-range="today" type="button">今日</button>
          <button data-range="week" type="button">本週</button>
          <button data-range="all" type="button">全部</button>
        </div>
        <div class="segmented" id="subjectFilters" aria-label="科目篩選"></div>
        <input id="searchBox" type="search" placeholder="搜尋章節、頁碼、筆記" />
      </section>

      <section class="content">
        <aside class="glass panel">
          <h2>科目進度</h2>
          <div id="subjectStats" class="stats"></div>
          <h2>讀書紀錄</h2>
          <div id="sessionLog" class="sessions"></div>
        </aside>

        <section class="task-column">
          <div class="section-title">
            <h2 id="taskHeading">今日任務</h2>
            <span id="taskCount">0 筆</span>
          </div>
          <div id="taskList" class="tasks"></div>
        </section>
      </section>
    </main>

    <template id="taskTemplate">
      <article class="task glass">
        <label class="check">
          <input type="checkbox" />
          <span></span>
        </label>
        <div class="task-main">
          <div class="task-meta">
            <span class="pill subject"></span>
            <span class="pill category"></span>
            <span class="date"></span>
          </div>
          <h3></h3>
          <p class="pages"></p>
          <details>
            <summary>細節</summary>
            <dl></dl>
          </details>
          <div class="task-actions">
            <a class="note" target="_blank" rel="noreferrer">筆記</a>
            <input class="reflection" type="text" placeholder="反思" />
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
